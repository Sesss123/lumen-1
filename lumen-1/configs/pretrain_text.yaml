# Lumen-1 training configs
stage: text
learning_rate: 3.0e-4
min_lr: 3.0e-5
batch_size_tokens: 4000000
max_steps: 500000
warmup_steps: 2000
stable_steps: 450000
decay_steps: 48000
weight_decay: 0.1
gradient_accumulation: 8
save_every: 1000
eval_every: 1000
use_fsdp: true
use_flash_attention: true
precision: bf16
