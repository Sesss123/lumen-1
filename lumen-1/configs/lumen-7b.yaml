# Lumen-1 7B primary config
model_size: "7b"

hidden_size: 4096
num_hidden_layers: 32
num_attention_heads: 32
num_key_value_heads: 8
head_dim: 128
intermediate_size: 14336
vocab_size: 128256
max_position_embeddings: 32768
rope_theta: 1000000.0
rope_scaling_factor: 4.0

sliding_window_size: 4096
global_sink_tokens: 4
global_attention_stride: 4096

vision_hidden_size: 768
vision_num_layers: 12
vision_num_heads: 12
vision_patch_size: 16
vision_image_size: 384
vision_intermediate_size: 3072

audio_hidden_size: 512
audio_num_layers: 12
audio_num_heads: 8
audio_conv_kernel_size: 31
audio_num_mel_bins: 80
audio_sample_rate: 16000
audio_tokens_per_second: 50

projector_hidden_size: 4096
dropout: 0.0
use_flash_attention: true
use_gradient_checkpointing: true
tie_word_embeddings: true

loss_weight_text: 1.0
loss_weight_vision: 0.3
loss_weight_audio: 0.2
loss_weight_alignment: 0.05
