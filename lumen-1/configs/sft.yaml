model_name_or_path: mistralai/Mistral-7B-Instruct-v0.2
output_dir: ../checkpoints/lumen_mistral_finetuned
dataset_name: ../data/sft.jsonl
dataset_text_field: "messages"
learning_rate: 2e-4
per_device_train_batch_size: 4
gradient_accumulation_steps: 4
num_train_epochs: 3
logging_steps: 10
save_steps: 100
optim: paged_adamw_32bit
lr_scheduler_type: cosine
max_seq_length: 2048
use_peft: true
lora_r: 16
lora_alpha: 32
lora_dropout: 0.05
load_in_4bit: true
load_in_8bit: false
